name: dry-run-tests
on:
  push:
    paths: ['tests/*.json']
permissions:
  contents: write

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: check spec
        id: c
        run: |
          F=$(git diff --name-only ${{ github.sha }}~1 ${{ github.sha }} -- 'tests/*.json' 2>/dev/null | head -1 || true); [ -z "$F" ] && F=$(git log -1 --name-only --pretty=format: ${{ github.sha }} -- tests/ | grep json | head -1)
          echo "file=$F" >> $GITHUB_OUTPUT
          python3 -c "import json;print('mode='+json.load(open('$F')).get('mode',''))" >> $GITHUB_OUTPUT
      - name: debug detecção
        run: |
          echo "job=register file=${{ steps.c.outputs.file }} mode=${{ steps.c.outputs.mode }} sha=$GITHUB_SHA" > /tmp/dbg.txt
          git log --oneline -3 >> /tmp/dbg.txt
          git diff --name-only HEAD~1 HEAD >> /tmp/dbg.txt 2>&1 || echo "diff falhou" >> /tmp/dbg.txt
          mkdir -p logs
          cp /tmp/dbg.txt logs/DEBUG_register_${{ github.run_id }}.txt
          git config user.name earnings-bot; git config user.email bot@users.noreply.github.com
          git pull -q --rebase || true
          git add logs/ && git commit -m "debug register ${{ github.run_id }}" -q && git push -q || true
      - name: deps
        if: steps.c.outputs.mode == 'register'
        run: pip install -q playwright && playwright install --with-deps chromium
      - name: run register test
        if: steps.c.outputs.mode == 'register'
        env:
          REG_NAME: ${{ secrets.REG_NAME }}
          REG_EMAIL: ${{ secrets.REG_EMAIL }}
          REG_COMPANY: ${{ secrets.REG_COMPANY }}
          REG_PHONE: ${{ secrets.REG_PHONE }}
          REG_TITLE_CATEGORY: Buy side
        run: cd scripts && python3 test_register.py "../${{ steps.c.outputs.file }}"
      - name: publicar resultado sanitizado
        if: always() && steps.c.outputs.mode == 'register'
        run: |
          mkdir -p logs && cp scripts/work/shots/resultado.txt logs/REGISTRO_${{ github.run_id }}.txt 2>/dev/null || true
          cp scripts/work/shots/form_dump.json logs/FORM_${{ github.run_id }}.json 2>/dev/null || true
          git config user.name earnings-bot; git config user.email bot@users.noreply.github.com
          for i in 1 2 3; do git pull -q --rebase || true; git add logs/; git commit -q -m "registro ${{ github.run_id }}" && git push -q && break || sleep $((i*7)); done; true
      - uses: actions/upload-artifact@v4
        if: always() && steps.c.outputs.mode == 'register'
        with:
          name: register-shots-${{ github.run_id }}
          path: scripts/work/shots/
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: check spec
        id: c
        run: |
          F=$(git diff --name-only ${{ github.sha }}~1 ${{ github.sha }} -- 'tests/*.json' 2>/dev/null | head -1 || true); [ -z "$F" ] && F=$(git log -1 --name-only --pretty=format: ${{ github.sha }} -- tests/ | grep json | head -1)
          echo "file=$F" >> $GITHUB_OUTPUT
          python3 -c "import json;print('mode='+json.load(open('$F')).get('mode',''))" >> $GITHUB_OUTPUT
      - name: debug detecção
        run: |
          echo "job=replay file=${{ steps.c.outputs.file }} mode=${{ steps.c.outputs.mode }} sha=$GITHUB_SHA" > /tmp/dbg.txt
          git log --oneline -3 >> /tmp/dbg.txt
          git diff --name-only HEAD~1 HEAD >> /tmp/dbg.txt 2>&1 || echo "diff falhou" >> /tmp/dbg.txt
          mkdir -p logs
          cp /tmp/dbg.txt logs/DEBUG_replay_${{ github.run_id }}.txt
          git config user.name earnings-bot; git config user.email bot@users.noreply.github.com
          git pull -q --rebase || true
          git add logs/ && git commit -m "debug replay ${{ github.run_id }}" -q && git push -q || true
      - name: deps
        if: steps.c.outputs.mode == 'replay'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          pip install -q faster-whisper yt-dlp pypdf
          python3 scripts/get_model.py
      - name: run replay test
        if: steps.c.outputs.mode == 'replay'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 scripts/test_replay.py "${{ steps.c.outputs.file }}"
      - name: publicar erro no repo
        if: failure() && steps.c.outputs.mode == 'replay'
        run: |
          mkdir -p logs && cp work/error.txt logs/ERRO_replay_${{ github.run_id }}.txt 2>/dev/null || echo "sem error.txt" > logs/ERRO_replay_${{ github.run_id }}.txt
          git config user.name earnings-bot; git config user.email bot@users.noreply.github.com
          git pull -q; git add logs/ && git commit -m "log de erro replay" && git push || true
      - name: commit transcript
        if: steps.c.outputs.mode == 'replay'
        run: |
          git config user.name earnings-bot; git config user.email bot@users.noreply.github.com
          for i in 1 2 3; do git pull -q --rebase || true; git add transcripts/; git commit -q -m "transcricao ${{ github.run_id }}" && git push -q && break || sleep $((i*7)); done; true

  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: check spec
        id: c
        run: |
          F=$(git diff --name-only ${{ github.sha }}~1 ${{ github.sha }} -- 'tests/*.json' 2>/dev/null | head -1 || true); [ -z "$F" ] && F=$(git log -1 --name-only --pretty=format: ${{ github.sha }} -- tests/ | grep json | head -1)
          echo "file=$F" >> $GITHUB_OUTPUT
          python3 -c "import json;print('mode='+json.load(open('$F')).get('mode',''))" >> $GITHUB_OUTPUT
      - name: deps
        if: steps.c.outputs.mode == 'capture'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg pulseaudio xvfb
          pip install -q playwright faster-whisper
          playwright install --with-deps chromium
          python3 scripts/get_model.py
      - name: run capture test
        if: steps.c.outputs.mode == 'capture'
        run: xvfb-run -a python3 scripts/test_capture.py "${{ steps.c.outputs.file }}"
      - name: publicar resultado
        if: always() && steps.c.outputs.mode == 'capture'
        run: |
          mkdir -p logs && cp work/error.txt logs/ERRO_capture_${{ github.run_id }}.txt 2>/dev/null || true
          git config user.name earnings-bot; git config user.email bot@users.noreply.github.com
          for i in 1 2 3; do git pull -q --rebase || true; git add transcripts/ logs/ 2>/dev/null; git commit -q -m "captura ${{ github.run_id }}" && git push -q && break || sleep $((i*7)); done; true

  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: check spec
        id: c
        run: |
          F=$(git diff --name-only ${{ github.sha }}~1 ${{ github.sha }} -- 'tests/*.json' 2>/dev/null | head -1 || true); [ -z "$F" ] && F=$(git log -1 --name-only --pretty=format: ${{ github.sha }} -- tests/ | grep json | head -1)
          echo "file=$F" >> $GITHUB_OUTPUT
          python3 -c "import json;print('mode='+json.load(open('$F')).get('mode',''))" >> $GITHUB_OUTPUT
      - name: deps
        if: steps.c.outputs.mode == 'scan'
        run: pip install -q playwright && playwright install --with-deps chromium
      - name: run scan
        if: steps.c.outputs.mode == 'scan'
        run: python3 scripts/scan_ri.py "${{ steps.c.outputs.file }}"
      - name: publicar
        if: always() && steps.c.outputs.mode == 'scan'
        run: |
          mkdir -p logs && cp work/scan_ri.json logs/SCAN_RI_${{ github.run_id }}.json 2>/dev/null || true
          git config user.name earnings-bot; git config user.email bot@users.noreply.github.com
          for i in 1 2 3; do git pull -q --rebase || true; git add logs/; git commit -q -m "scan ${{ github.run_id }}" && git push -q && break || sleep $((i*7)); done; true

  mailing:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: check spec
        id: c
        run: |
          F=$(git diff --name-only ${{ github.sha }}~1 ${{ github.sha }} -- 'tests/*.json' 2>/dev/null | head -1 || true); [ -z "$F" ] && F=$(git log -1 --name-only --pretty=format: ${{ github.sha }} -- tests/ | grep json | head -1)
          echo "file=$F" >> $GITHUB_OUTPUT
          python3 -c "import json;print('mode='+json.load(open('$F')).get('mode',''))" >> $GITHUB_OUTPUT
      - name: deps
        if: steps.c.outputs.mode == 'mailing'
        run: pip install -q playwright && playwright install --with-deps chromium
      - name: run notion test
        if: steps.c.outputs.mode == 'notion_test'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          pip install -q requests
          python3 scripts/notion_test.py || true
          mkdir -p logs && cp work/notion_test.json logs/NOTIONTEST_${{ github.run_id }}.json 2>/dev/null || true
          git config user.name earnings-bot; git config user.email bot@users.noreply.github.com
          for i in 1 2 3; do git pull -q --rebase || true; git add logs/; git commit -q -m "notiontest ${{ github.run_id }}" && git push -q && break || sleep $((i*7)); done; true
      - name: run mailing url discovery
        if: steps.c.outputs.mode == 'mailurl'
        run: |
          pip install -q playwright && playwright install --with-deps chromium
          python3 scripts/mailing_urls.py "${{ steps.c.outputs.file }}"
          mkdir -p logs && cp work/mailing_urls.json logs/MAILURLS_${{ github.run_id }}.json || true
          git config user.name earnings-bot; git config user.email bot@users.noreply.github.com
          for i in 1 2 3; do git pull -q --rebase || true; git add logs/; git commit -q -m "mailurls ${{ github.run_id }}" && git push -q && break || sleep $((i*7)); done; true
      - name: run mailing signup
        if: steps.c.outputs.mode == 'mailing'
        env:
          REG_NAME: ${{ secrets.REG_NAME }}
          REG_EMAIL: ${{ secrets.REG_EMAIL }}
          REG_COMPANY: ${{ secrets.REG_COMPANY }}
          REG_PHONE: ${{ secrets.REG_PHONE }}
        run: python3 scripts/mailing_signup.py "${{ steps.c.outputs.file }}"
      - name: publicar
        if: always() && steps.c.outputs.mode == 'mailing'
        run: |
          mkdir -p logs && cp work/mailing.json logs/MAILING_${{ github.run_id }}.json 2>/dev/null || true
          git config user.name earnings-bot; git config user.email bot@users.noreply.github.com
          for i in 1 2 3; do git pull -q --rebase || true; git add logs/; git commit -q -m "mailing ${{ github.run_id }}" && git push -q && break || sleep $((i*7)); done; true
